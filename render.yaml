services:
  - type: web
    name: tax-bill-tool
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn web_app.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    envVars:
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: TAX_TOOL_DATA_DIR
        value: /tmp/tax-bill-tool
      - key: MAX_UPLOAD_BYTES
        value: "20971520"
